name: E2E

# Tests end-to-end Playwright. Gardé : ne s'exécute QUE si la variable de dépôt
# RUN_E2E == 'true' (Settings → Secrets and variables → Actions → Variables).
# Nécessite une app déployée (preview/staging) + un compte de test dédié.
# Tant que RUN_E2E n'est pas défini, ce workflow est un no-op et ne bloque rien.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    if: ${{ vars.RUN_E2E == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e
        env:
          # URL de l'app de test (preview Vercel / staging). En CI, le webServer
          # local est désactivé : cette URL DOIT pointer vers une app en ligne.
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          # Comptes de test (jamais des comptes de production)
          TEST_SYNDIC_EMAIL: ${{ secrets.TEST_SYNDIC_EMAIL }}
          TEST_SYNDIC_PASSWORD: ${{ secrets.TEST_SYNDIC_PASSWORD }}
          TEST_PORTAIL_EMAIL: ${{ secrets.TEST_PORTAIL_EMAIL }}
          TEST_PORTAIL_PASSWORD: ${{ secrets.TEST_PORTAIL_PASSWORD }}
          TEST_TENANT_EMAIL: ${{ secrets.TEST_TENANT_EMAIL }}
          TEST_TENANT_PASSWORD: ${{ secrets.TEST_TENANT_PASSWORD }}

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
